plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.beacon'
version = '0.1.0'

android {
  namespace "expo.modules.beacon"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
    minSdkVersion 23
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'org.altbeacon:android-beacon-library:2.21.2'
}
